<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>proyecto_2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Pilotos MotoGP</h1>
        <p>Selecciona un piloto para conocer más sobre él</p>
    </header>

    <div class="contenedor-imagen">
        <img id="visorImagen" alt="Imagen principal">
    </div>

    <div class="info-piloto" id="infoPiloto">
        <h2 id="nombrePiloto">Selecciona un piloto</h2>
        <p id="descPiloto">Haz clic en uno de los botones para ver la información.</p>
    </div>

    <div class="contenedor-botones">
        <button onclick="cambiarPiloto('valentino', this)">Valentino Rossi</button>
        <button onclick="cambiarPiloto('marc', this)">Marc Marquez</button>
        <button onclick="cambiarPiloto('lorenzo', this)">Lorenzo</button>
        <button onclick="cambiarPiloto('garcia', this)">Nestor Garcia</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
